<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太空射击 - Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 20px;
            text-shadow: 0 0 10px #0ff;
        }
        .screen {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #0ff;
            box-shadow: 0 0 30px #0ff;
            pointer-events: auto;
        }
        h1 {
            color: #0ff;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }
        p {
            color: #fff;
            margin: 10px 0;
            font-size: 14px;
        }
        .btn {
            background: linear-gradient(45deg, #0ff, #00f);
            color: #fff;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 20px #0ff;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .hidden {
            display: none !important;
        }
        .controls {
            color: #aaa;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="hud">
        <div>分数：<span id="score">0</span></div>
        <div>生命：<span id="lives">3</span></div>
    </div>

    <div id="ui">
        <div id="startScreen" class="screen">
            <h1>🚀 太空射击</h1>
            <p>消灭所有敌人，生存到最后！</p>
            <div class="controls">
                <p>💻 电脑：方向键/WASD 移动，空格射击</p>
                <p>📱 手机：触摸拖动移动，自动射击</p>
            </div>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        <div id="gameOverScreen" class="screen hidden">
            <h1 style="color: #f00; text-shadow: 0 0 20px #f00;">💥 游戏结束</h1>
            <p>最终分数：<span id="finalScore">0</span></p>
            <button class="btn" style="background: linear-gradient(45deg, #f00, #f0f);" onclick="startGame()">再来一次</button>
        </div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let frame = 0;
        
        // 画布设置
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // 玩家
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            speed: 7,
            color: '#0ff',
            bullets: [],
            lastShot: 0
        };
        
        // 敌人
        let enemies = [];
        
        // 粒子效果
        let particles = [];
        
        // 星空背景
        let stars = [];
        for(let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // 键盘控制
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        // 触摸控制
        let touchX = null;
        canvas.addEventListener('touchstart', e => {
            touchX = e.touches[0].clientX;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
        });
        canvas.addEventListener('touchend', () => touchX = null);
        
        // 初始化玩家位置
        function initPlayer() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 100;
            player.bullets = [];
        }
        
        // 创建敌人
        function spawnEnemy() {
            const size = 30 + Math.random() * 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: 2 + Math.random() * 2 + score / 500,
                color: '#f00',
                health: 1 + Math.floor(score / 300)
            });
        }
        
        // 创建粒子
        function createParticles(x, y, color, count) {
            for(let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }
        
        // 更新游戏
        function update() {
            if(!gameRunning) return;
            
            frame++;
            
            // 玩家移动 - 键盘
            if(keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if(keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            if(keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if(keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            
            // 玩家移动 - 触摸
            if(touchX !== null) {
                player.x += (touchX - player.width/2 - player.x) * 0.1;
            }
            
            // 边界限制
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            
            // 射击 - 键盘
            if(keys['Space'] && frame - player.lastShot > 15) {
                player.bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    speed: 10
                });
                player.lastShot = frame;
            }
            
            // 射击 - 触摸 (自动)
            if(touchX !== null && frame - player.lastShot > 20) {
                player.bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    speed: 10
                });
                player.lastShot = frame;
            }
            
            // 更新子弹
            for(let i = player.bullets.length - 1; i >= 0; i--) {
                player.bullets[i].y -= player.bullets[i].speed;
                if(player.bullets[i].y < 0) {
                    player.bullets.splice(i, 1);
                }
            }
            
            // 生成敌人
            if(frame % 60 === 0) {
                spawnEnemy();
            }
            
            // 更新敌人
            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                
                // 敌人碰撞玩家
                if(checkCollision(player, enemies[i])) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    createParticles(player.x + player.width/2, player.y + player.height/2, '#0ff', 20);
                    enemies.splice(i, 1);
                    
                    if(lives <= 0) {
                        gameOver();
                    }
                    continue;
                }
                
                // 子弹碰撞敌人
                for(let j = player.bullets.length - 1; j >= 0; j--) {
                    if(checkCollision(player.bullets[j], enemies[i])) {
                        enemies[i].health--;
                        player.bullets.splice(j, 1);
                        
                        if(enemies[i].health <= 0) {
                            score += 10;
                            document.getElementById('score').textContent = score;
                            createParticles(enemies[i].x + enemies[i].width/2, enemies[i].y + enemies[i].height/2, '#f00', 15);
                            enemies.splice(i, 1);
                        }
                        break;
                    }
                }
                
                // 敌人超出屏幕
                if(enemies[i] && enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                }
            }
            
            // 更新粒子
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.02;
                if(particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 更新星空
            for(let star of stars) {
                star.y += star.speed;
                if(star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            }
        }
        
        // 碰撞检测
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制星空
            ctx.fillStyle = '#fff';
            for(let star of stars) {
                ctx.globalAlpha = star.life || 1;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            if(!gameRunning) return;
            
            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 绘制子弹
            ctx.fillStyle = '#ff0';
            for(let bullet of player.bullets) {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            }
            
            // 绘制敌人
            for(let enemy of enemies) {
                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                ctx.shadowBlur = 0;
            }
            
            // 绘制粒子
            for(let p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        // 游戏循环
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // 开始游戏
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            frame = 0;
            enemies = [];
            particles = [];
            player.bullets = [];
            
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            initPlayer();
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // 启动
        initPlayer();
        loop();
    </script>
</body>
</html>
