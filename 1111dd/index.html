<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>霓虹太空</title>
    <style>
        /* === 修复点：去掉了注释里的非法符号 & === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #111;
            font-family: &apos;Arial&apos;, sans-serif;
            touch-action: manipulation; /* 优化移动端点击 */
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(circle, #1a2a4a, #000);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            pointer-events: auto;
        }
        #start-screen h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        #start-btn {
            font-size: 1.5em;
            padding: 10px 30px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }
        #start-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #ff66cc, #6666ff);
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="start-screen">
        <h1>霓虹太空</h1>
        <p style="color: #fff; margin-bottom: 30px;">电脑：方向键/WASD移动，空格射击<br>手机：触摸屏幕移动并自动射击</p>
        <button id="start-btn">开始游戏</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById(&apos;gameCanvas&apos;);
    const ctx = canvas.getContext(&apos;2d&apos;);
    const startScreen = document.getElementById(&apos;start-screen&apos;);
    const startBtn = document.getElementById(&apos;start-btn&apos;);

    // 修复点：确保按钮点击事件绑定在 DOM 加载完成后
    startBtn.addEventListener(&apos;click&apos;, startGame);

    function startGame() {
        console.log("游戏开始按钮被点击");
        startScreen.style.display = &apos;none&apos;; // 隐藏开始界面
        initGame(); // 启动游戏主循环
    }

    // --- 游戏核心逻辑 ---

    // 设置画布大小
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener(&apos;resize&apos;, resizeCanvas);

    let player = {
        x: 0,
        y: 0,
        radius: 15,
        speed: 5,
        color: &apos;#00ffff&apos;,
        bullets: [],
        score: 0
    };

    let enemies = [];
    let particles = [];
    let keys = {};
    let gameActive = false;

    // 初始化游戏状态
    function initGame() {
        gameActive = true;
        player.x = canvas.width / 2;
        player.y = canvas.height - 100;
        player.bullets = [];
        enemies = [];
        particles = [];
        player.score = 0;

        // 创建敌人生成器
        createEnemy();
    }

    // 创建敌人
    function createEnemy() {
        if (!gameActive) return;

        const enemy = {
            x: Math.random() * (canvas.width - 40) + 20,
            y: -30,
            radius: 10 + Math.random() * 10,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            speed: 1 + Math.random() * 2
        };
        enemies.push(enemy);

        // 递归创建下一个敌人
        setTimeout(createEnemy, 1000 - Math.min(player.score, 500));
    }

    // 创建子弹
    function createBullet() {
        if (!gameActive) return;

        const bullet = {
            x: player.x,
            y: player.y - player.radius,
            radius: 3,
            color: &apos;#fff&apos;,
            speed: 8
        };
        player.bullets.push(bullet);
    }

    // 创建粒子效果
    function createParticles(x, y, color) {
        for (let i = 0; i < 10; i++) {
            particles.push({
                x: x,
                y: y,
                radius: Math.random() * 3,
                color: color,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 1
            });
        }
    }

    // 游戏主循环
    function gameLoop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 1. 玩家移动 ---
        if (keys[&apos;ArrowLeft&apos;] || keys[&apos;a&apos;]) player.x -= player.speed;
        if (keys[&apos;ArrowRight&apos;] || keys[&apos;d&apos;]) player.x += player.speed;
        if (keys[&apos;ArrowUp&apos;] || keys[&apos;w&apos;]) player.y -= player.speed;
        if (keys[&apos;ArrowDown&apos;] || keys[&apos;s&apos;]) player.y += player.speed;

        // 边界检测
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

        // --- 2. 绘制玩家 ---
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();

        // --- 3. 子弹逻辑 ---
        player.bullets.forEach((bullet, index) => {
            bullet.y -= bullet.speed;
            if (bullet.y < 0) player.bullets.splice(index, 1);

            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
            ctx.fillStyle = bullet.color;
            ctx.fill();
            ctx.closePath();
        });

        // --- 4. 敌人逻辑 ---
        enemies.forEach((enemy, eIndex) => {
            enemy.y += enemy.speed;

            // 碰撞检测：敌人到底部
            if (enemy.y - enemy.radius > canvas.height) {
                player.score -= 10;
                enemies.splice(eIndex, 1);
                createParticles(enemy.x, enemy.y, enemy.color);
            }

            // 碰撞检测：玩家撞敌人
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < player.radius + enemy.radius) {
                gameActive = false;
                alert(`游戏结束！你的得分是：${player.score}`);
                location.reload(); // 重新加载页面
            }

            // 绘制敌人
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fillStyle = enemy.color;
            ctx.fill();
            ctx.closePath();

            // 子弹击中敌人
            player.bullets.forEach((bullet, bIndex) => {
                const edx = bullet.x - enemy.x;
                const edy = bullet.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);
                if (edist < bullet.radius + enemy.radius) {
                    player.bullets.splice(bIndex, 1);
                    enemies.splice(eIndex, 1);
                    player.score += 10;
                    createParticles(enemy.x, enemy.y, enemy.color);
                }
            });
        });

        // --- 5. 粒子效果 ---
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(index, 1);

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.closePath();
        });

        // --- 6. 显示分数 ---
        ctx.font = &apos;20px Arial&apos;;
        ctx.fillStyle = &apos;#fff&apos;;
        ctx.fillText(`得分: ${player.score}`, 20, 30);

        requestAnimationFrame(gameLoop);
    }

    // --- 事件监听 ---
    // 键盘按下/松开
    window.addEventListener(&apos;keydown&apos;, e => {
        keys[e.key] = true;
        // 空格键射击
        if (e.key === &apos; &apos; && gameActive) {
            createBullet();
        }
    });
    window.addEventListener(&apos;keyup&apos;, e => {
        keys[e.key] = false;
    });

    // 触摸移动 (手机)
    canvas.addEventListener(&apos;touchmove&apos;, e => {
        if (!gameActive) return;
        const touch = e.touches[0];
        player.x = touch.clientX;
        player.y = touch.clientY;
        e.preventDefault();
    });

    // 触摸射击 (手机)
    canvas.addEventListener(&apos;touchstart&apos;, e => {
        if (!gameActive) return;
        createBullet();
        e.preventDefault();
    });
</script>

</body>
</html>
