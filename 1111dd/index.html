<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash - Cloudflare Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* 禁止手机上的默认触摸行为 */
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让点击穿透到 Canvas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
        }
        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ffcc;
            pointer-events: auto; /* 允许点击按钮 */
            transition: opacity 0.3s;
        }
        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #fff;
        }
        p {
            color: #ccc;
            margin-bottom: 30px;
        }
        button {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 10px #00ffcc;
        }
        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
        }
        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hud">SCORE: <span id="score">0</span></div>
    
    <div id="ui-layer">
        <div id="start-screen">
            <h1>Neon Dash</h1>
            <p>移动鼠标或触摸屏幕来控制光球。<br>躲避红色的方块！</p>
            <button onclick="startGame()">开始游戏</button>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1 style="color: #ff3333; text-shadow: 0 0 10px #ff3333;">GAME OVER</h1>
            <p>最终得分：<span id="final-score">0</span></p>
            <button onclick="startGame()" style="border-color: #ff3333; color: #ff3333; box-shadow: 0 0 10px #ff3333;">再试一次</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        let width, height;
        let player;
        let enemies = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let frameCount = 0;
        let difficultyMultiplier = 1;

        // 调整画布大小
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 玩家类
        class Player {
            constructor() {
                this.x = width / 2;
                this.y = height - 100;
                this.radius = 15;
                this.color = '#00ffcc';
                this.targetX = this.x;
                this.targetY = this.y;
            }

            update() {
                // 简单的平滑跟随效果
                this.x += (this.targetX - this.x) * 0.15;
                this.y += (this.targetY - this.y) * 0.15;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0; // 重置阴影以提高性能
            }
        }

        // 敌人类
        class Enemy {
            constructor() {
                this.size = Math.random() * 30 + 20;
                this.x = Math.random() * (width - this.size);
                this.y = -this.size;
                this.speed = (Math.random() * 3 + 2) * difficultyMultiplier;
                this.color = '#ff3333';
                this.rotation = 0;
                this.rotationSpeed = Math.random() * 0.1 - 0.05;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        // 粒子效果类 (爆炸效果)
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = color;
                this.life = 100;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 2;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 100;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 输入处理
        function handleInput(x, y) {
            if (!gameRunning) return;
            player.targetX = x;
            player.targetY = y;
        }

        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => {
            e.preventDefault(); // 防止滚动
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // 碰撞检测
        function checkCollision(p, e) {
            // 简单的矩形与圆形碰撞检测
            let distX = Math.abs(p.x - (e.x + e.size/2));
            let distY = Math.abs(p.y - (e.y + e.size/2));

            if (distX > (e.size/2 + p.radius)) return false;
            if (distY > (e.size/2 + p.radius)) return false;

            if (distX <= (e.size/2)) return true;
            if (distY <= (e.size/2)) return true;

            let dx = distX - e.size/2;
            let dy = distY - e.size/2;
            return (dx*dx + dy*dy <= (p.radius*p.radius));
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function gameOver() {
            gameRunning = false;
            createExplosion(player.x, player.y, '#00ffcc');
            finalScoreEl.innerText = Math.floor(score);
            gameOverScreen.classList.remove('hidden');
        }

        function startGame() {
            player = new Player();
            enemies = [];
            particles = [];
            score = 0;
            frameCount = 0;
            difficultyMultiplier = 1;
            scoreEl.innerText = '0';
            gameRunning = true;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // 重置玩家位置到中心
            player.targetX = width / 2;
            player.targetY = height - 100;
            
            loop();
        }

        function loop() {
            if (!gameRunning && particles.length === 0) return;

            // 清空画布 (带一点拖尾效果)
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            if (gameRunning) {
                frameCount++;
                score += 0.1;
                scoreEl.innerText = Math.floor(score);

                // 增加难度
                if (frameCount % 600 === 0) {
                    difficultyMultiplier += 0.1;
                }

                // 生成敌人
                if (frameCount % Math.max(20, Math.floor(60 - difficultyMultiplier * 5)) === 0) {
                    enemies.push(new Enemy());
                }

                player.update();
                player.draw();
            }

            // 更新和绘制敌人
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (gameRunning) e.update();
                e.draw();

                // 移除超出屏幕的敌人
                if (e.y > height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // 碰撞检测
                if (gameRunning && checkCollision(player, e)) {
                    gameOver();
                }
            }

            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }

        // 初始画面渲染一次背景
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

    </script>
</body>
</html>
